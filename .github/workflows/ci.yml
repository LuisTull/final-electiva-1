name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Static analysis
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Build Docker image
        run: docker build -t devops-demo-app:${{ github.sha }} .
