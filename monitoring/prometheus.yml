global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:3000"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
